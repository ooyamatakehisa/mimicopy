name: CI and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: mimicopy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  image:
    name: Publish Docker Image
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    needs: image
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.MIMICOPY_DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.MIMICOPY_DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.MIMICOPY_DEPLOY_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.MIMICOPY_DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.MIMICOPY_DEPLOY_USER }}
    steps:
      - name: Check deploy configuration
        id: deploy-config
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_PATH" ] && [ -n "$DEPLOY_SSH_KEY" ] && [ -n "$DEPLOY_USER" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped because MIMICOPY_DEPLOY_* secrets are not fully configured."
          fi

      - name: Install SSH key
        if: steps.deploy-config.outputs.enabled == 'true'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/mimicopy_deploy
          chmod 600 ~/.ssh/mimicopy_deploy
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull image and restart service
        if: steps.deploy-config.outputs.enabled == 'true'
        run: |
          ssh -i ~/.ssh/mimicopy_deploy -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && git pull --ff-only && docker compose pull mimicopy && docker compose up -d --remove-orphans mimicopy"
