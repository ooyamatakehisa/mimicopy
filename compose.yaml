services:
  mimicopy-dev:
    build:
      context: .
      target: dev
    command: pnpm dev
    profiles:
      - dev
    user: "${MIMICOPY_UID:-1000}:${MIMICOPY_GID:-1000}"
    ports:
      - "127.0.0.1:${MIMICOPY_DEV_CLIENT_PORT:-8080}:8080"
      - "127.0.0.1:${MIMICOPY_DEV_API_PORT:-5174}:5174"
    environment:
      FFMPEG_PATH: /usr/bin/ffmpeg
      MIMICOPY_API_PORT: 5174
      MIMICOPY_CLIENT_HOST: 0.0.0.0
      MIMICOPY_CLIENT_PORT: 8080
      MIMICOPY_MADMOM_PYTHON: /usr/bin/python3
      MIMICOPY_STORAGE_DIR: /data
      NODE_ENV: development
      PORT: 5174
    volumes:
      - .:/app
      - mimicopy-node-modules:/app/node_modules
      - ${MIMICOPY_DEV_STORAGE_PATH:-./storage}:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5174/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  mimicopy:
    image: ghcr.io/ooyamatakehisa/mimicopy:${MIMICOPY_IMAGE_TAG:-main}
    build:
      context: .
    user: "${MIMICOPY_UID:-1000}:${MIMICOPY_GID:-1000}"
    ports:
      - "127.0.0.1:${MIMICOPY_HOST_PORT:-5174}:5174"
    environment:
      FFMPEG_PATH: /usr/bin/ffmpeg
      MIMICOPY_MADMOM_PYTHON: /usr/bin/python3
      MIMICOPY_STORAGE_DIR: /data
      NODE_ENV: production
      PORT: 5174
    volumes:
      - ${MIMICOPY_STORAGE_PATH:-./storage}:/data
    restart: unless-stopped

volumes:
  mimicopy-node-modules:
